name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-gate:
    runs-on: ubuntu-24.04
    env:
      REQUIRE_EXTERNAL_AGENTS: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "26.5.0"
          cache: ""
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.14"
      - name: Install pinned external agent clients
        run: |
          npm install --global opencode-ai@1.17.18
          python3 -m pip install hermes-agent==0.15.2
      - run: bun install --frozen-lockfile
      - run: bun run protocol:check
      - run: bun run deps:check
      - run: bun run check
      - name: Kubernetes client dry-run
        run: |
          kubectl kustomize deploy/base >/tmp/rendered.yaml
          kubectl apply --dry-run=client -f /tmp/rendered.yaml

  image:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
      - name: Build multiarch OCI image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          outputs: type=oci,dest=/tmp/openai-oauth-proxy.oci
          provenance: true
      - name: Generate image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: oci-archive:/tmp/openai-oauth-proxy.oci
          format: spdx-json
          output-file: /tmp/openai-oauth-proxy.spdx.json
      - name: Scan SBOM for vulnerabilities
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2
        with:
          sbom: /tmp/openai-oauth-proxy.spdx.json
          fail-build: true
          severity-cutoff: high
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: openai-oauth-proxy-sbom
          path: /tmp/openai-oauth-proxy.spdx.json
          if-no-files-found: error
