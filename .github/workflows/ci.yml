name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-gate:
    runs-on: ubuntu-latest
    env:
      REQUIRE_EXTERNAL_AGENTS: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: ""
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install pinned external agent clients
        run: |
          bun i -g opencode-ai@1.17.18
          python3 -m pip install hermes-agent==0.15.2
      - run: bun install --frozen-lockfile
      - run: bun run protocol:check
      - run: bun run deps:check
      - run: bun run check
      - name: Kubernetes client dry-run
        run: |
          kubectl kustomize deploy/base >/tmp/rendered.yaml
          kubectl apply --dry-run=client -f /tmp/rendered.yaml

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Build multiarch OCI image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          outputs: type=oci,dest=/tmp/openai-oauth-proxy.oci
          provenance: true
      - name: Select platform OCI images
        run: |
          set -euo pipefail
          for architecture in amd64 arm64; do
            layout="/tmp/openai-oauth-proxy-${architecture}.oci"
            mkdir "$layout"
            tar -xf /tmp/openai-oauth-proxy.oci -C "$layout"
            root_index_digest="$(jq -r '.manifests[0].digest' "$layout/index.json" | cut -d: -f2)"
            jq -e --arg architecture "$architecture" \
              '(.manifests |= map(select(.platform.os == "linux" and .platform.architecture == $architecture))) | if (.manifests | length) == 1 then . else error("expected one platform manifest") end' \
              "$layout/blobs/sha256/$root_index_digest" > "$layout/index.json"
          done
      - name: Generate linux/amd64 image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: oci-dir:/tmp/openai-oauth-proxy-amd64.oci
          format: spdx-json
          output-file: /tmp/openai-oauth-proxy-amd64.spdx.json
          upload-artifact: false
      - name: Scan linux/amd64 SBOM for vulnerabilities
        uses: anchore/scan-action@v7
        with:
          sbom: /tmp/openai-oauth-proxy-amd64.spdx.json
          fail-build: true
          severity-cutoff: high
      - name: Generate linux/arm64 image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: oci-dir:/tmp/openai-oauth-proxy-arm64.oci
          format: spdx-json
          output-file: /tmp/openai-oauth-proxy-arm64.spdx.json
          upload-artifact: false
      - name: Scan linux/arm64 SBOM for vulnerabilities
        uses: anchore/scan-action@v7
        with:
          sbom: /tmp/openai-oauth-proxy-arm64.spdx.json
          fail-build: true
          severity-cutoff: high
      - uses: actions/upload-artifact@v7
        with:
          name: openai-oauth-proxy-sbom
          path: |
            /tmp/openai-oauth-proxy-amd64.spdx.json
            /tmp/openai-oauth-proxy-arm64.spdx.json
          if-no-files-found: error
