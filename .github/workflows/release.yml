name: Release image

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: release-images
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Normalize GHCR image name
        id: image
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/openai-oauth-proxy"
          printf 'IMAGE=%s\n' "$IMAGE" >> "$GITHUB_ENV"
          printf 'image=%s\n' "$IMAGE" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: ""
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - run: bun install --frozen-lockfile
      - run: bun run protocol:check
      - run: bun run deps:check
      - run: bun run check
      - name: Authenticate to GHCR
        run: echo "$GITHUB_TOKEN" | docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Refuse to overwrite the version tag
        run: |
          set +e
          docker buildx imagetools inspect "$IMAGE:$GITHUB_REF_NAME" >/tmp/version-tag-probe.out 2>/tmp/version-tag-probe.err
          VERSION_PROBE_STATUS=$?
          set -e
          if [ "$VERSION_PROBE_STATUS" -eq 0 ]; then
            echo "Version image already exists; refusing to overwrite immutable tag" >&2
            exit 1
          fi
          if ! grep -Eiq 'manifest unknown|not found' /tmp/version-tag-probe.err; then
            cat /tmp/version-tag-probe.err >&2
            echo "Unable to verify version tag absence; refusing to publish" >&2
            exit 1
          fi
      - name: Refuse to overwrite the source tag
        run: |
          set +e
          docker buildx imagetools inspect "$IMAGE:sha-$GITHUB_SHA" >/tmp/source-tag-probe.out 2>/tmp/source-tag-probe.err
          SOURCE_PROBE_STATUS=$?
          set -e
          if [ "$SOURCE_PROBE_STATUS" -eq 0 ]; then
            echo "Source image already exists; refusing to overwrite immutable tag" >&2
            exit 1
          fi
          if ! grep -Eiq 'manifest unknown|not found' /tmp/source-tag-probe.err; then
            cat /tmp/source-tag-probe.err >&2
            echo "Unable to verify source tag absence; refusing to publish" >&2
            exit 1
          fi
      - name: Build and push multiarch image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          outputs: type=image,name=${{ steps.image.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          provenance: true
          sbom: true
      - name: Validate candidate digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          [[ "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          docker buildx imagetools inspect "$IMAGE@$DIGEST" >/dev/null
      - name: Generate published image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.image.outputs.image }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: /tmp/openai-oauth-proxy.spdx.json
      - name: Scan SBOM for vulnerabilities
        uses: anchore/scan-action@v7
        with:
          sbom: /tmp/openai-oauth-proxy.spdx.json
          fail-build: true
          severity-cutoff: critical
      - uses: actions/upload-artifact@v7
        with:
          name: openai-oauth-proxy-${{ github.ref_name }}-sbom
          path: /tmp/openai-oauth-proxy.spdx.json
          if-no-files-found: error
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2
      - name: Sign scanned image digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE@$DIGEST"
      - name: Create final release tags
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          docker buildx imagetools create \
            --tag "$IMAGE:$GITHUB_REF_NAME" \
            --tag "$IMAGE:sha-$GITHUB_SHA" \
            "$IMAGE@$DIGEST"
      - name: Verify published release
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          docker buildx imagetools inspect "$IMAGE:$GITHUB_REF_NAME" | grep -Eq "^Digest:[[:space:]]+$DIGEST$"
          docker buildx imagetools inspect "$IMAGE:sha-$GITHUB_SHA" | grep -Eq "^Digest:[[:space:]]+$DIGEST$"
          docker buildx imagetools inspect "$IMAGE@$DIGEST" --raw >/tmp/manifest.json
          jq -r '.manifests[] | select(.platform.os != "unknown") | .platform | "\(.os)/\(.architecture)"' /tmp/manifest.json | sort -u >/tmp/platforms
          diff -u <(printf '%s\n' linux/amd64 linux/arm64) /tmp/platforms
          jq -e '[.manifests[] | select(.annotations["vnd.docker.reference.type"] == "attestation-manifest")] | length >= 2' /tmp/manifest.json
          cosign verify \
            --certificate-identity "https://github.com/$GITHUB_WORKFLOW_REF" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$IMAGE@$DIGEST"
